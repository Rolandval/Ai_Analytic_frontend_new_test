services:
  frontend-dev:
    image: node:18-alpine
    container_name: ai-analytic-frontend-dev
    working_dir: /app
    ports:
      - "0.0.0.0:${FRONTEND_PORT:-5177}:5177"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    env_file:
      - ./.env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - FRONTEND_PORT=${FRONTEND_PORT:-5177}
      - BACKEND_PORT=${BACKEND_PORT:-8002}
      - SERVER_HOST=localhost
    command: >
      sh -c "npm ci --force && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-5177}"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  node_modules: