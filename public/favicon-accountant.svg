<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle with dark blue gradient -->
  <defs>
    <linearGradient id="accountant-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="16" cy="16" r="15" fill="url(#accountant-gradient)" stroke="#1e3a8a" stroke-width="2"/>
  
  <!-- Calculator/Accountant icon -->
  <rect x="8" y="6" width="16" height="20" rx="2" fill="white" opacity="0.9"/>
  <rect x="10" y="8" width="12" height="3" fill="#1e40af" opacity="0.8"/>
  
  <!-- Calculator buttons -->
  <rect x="10" y="13" width="2.5" height="2" fill="#1e40af" opacity="0.6"/>
  <rect x="13.5" y="13" width="2.5" height="2" fill="#1e40af" opacity="0.6"/>
  <rect x="17" y="13" width="2.5" height="2" fill="#1e40af" opacity="0.6"/>
  <rect x="20.5" y="13" width="2.5" height="2" fill="#1e40af" opacity="0.6"/>
  
  <rect x="10" y="16" width="2.5" height="2" fill="#1e40af" opacity="0.6"/>
  <rect x="13.5" y="16" width="2.5" height="2" fill="#1e40af" opacity="0.6"/>
  <rect x="17" y="16" width="2.5" height="2" fill="#1e40af" opacity="0.6"/>
  <rect x="20.5" y="16" width="2.5" height="2" fill="#1e40af" opacity="0.6"/>
</svg>
