<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle with cyan gradient -->
  <defs>
    <linearGradient id="email-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="16" cy="16" r="15" fill="url(#email-gradient)" stroke="#0e7490" stroke-width="2"/>
  
  <!-- Email icon -->
  <rect x="6" y="10" width="20" height="12" rx="2" fill="white" opacity="0.9"/>
  <path d="M6 12l10 6 10-6" stroke="#06b6d4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- @ symbol -->
  <circle cx="20" cy="18" r="3" stroke="#06b6d4" stroke-width="1.5" fill="none"/>
  <circle cx="20" cy="18" r="1" fill="#06b6d4"/>
</svg>
