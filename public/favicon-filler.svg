<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="16" cy="16" r="15" fill="url(#bg-gradient)" stroke="#047857" stroke-width="2"/>
  
  <!-- Content filling icon - document with lines -->
  <rect x="8" y="6" width="16" height="20" rx="2" fill="white" opacity="0.9"/>
  <rect x="10" y="9" width="12" height="1.5" fill="#10b981" opacity="0.8"/>
  <rect x="10" y="12" width="10" height="1.5" fill="#10b981" opacity="0.6"/>
  <rect x="10" y="15" width="8" height="1.5" fill="#10b981" opacity="0.4"/>
  
  <!-- AI magic sparkles -->
  <circle cx="12" cy="18" r="1" fill="#fbbf24" opacity="0.9"/>
  <circle cx="20" cy="20" r="0.8" fill="#fbbf24" opacity="0.7"/>
  <circle cx="18" cy="16" r="0.6" fill="#fbbf24" opacity="0.8"/>
  
  <!-- Plus icon for adding content -->
  <rect x="15" y="22" width="2" height="6" fill="#10b981"/>
  <rect x="13" y="24" width="6" height="2" fill="#10b981"/>
</svg>
