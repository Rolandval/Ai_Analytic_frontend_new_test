<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle with teal gradient -->
  <defs>
    <linearGradient id="price-builder-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="16" cy="16" r="15" fill="url(#price-builder-gradient)" stroke="#134e4a" stroke-width="2"/>
  
  <!-- Price builder icon -->
  <rect x="8" y="8" width="16" height="16" rx="2" fill="white" opacity="0.9"/>
  
  <!-- Grid lines -->
  <line x1="12" y1="8" x2="12" y2="24" stroke="#0d9488" stroke-width="1" opacity="0.5"/>
  <line x1="16" y1="8" x2="16" y2="24" stroke="#0d9488" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="8" x2="20" y2="24" stroke="#0d9488" stroke-width="1" opacity="0.5"/>
  
  <line x1="8" y1="12" x2="24" y2="12" stroke="#0d9488" stroke-width="1" opacity="0.5"/>
  <line x1="8" y1="16" x2="24" y2="16" stroke="#0d9488" stroke-width="1" opacity="0.5"/>
  <line x1="8" y1="20" x2="24" y2="20" stroke="#0d9488" stroke-width="1" opacity="0.5"/>
  
  <!-- Dollar sign -->
  <text x="16" y="18" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#0d9488" text-anchor="middle">$</text>
</svg>
